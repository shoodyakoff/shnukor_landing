# Reverse proxy for the Shnurok app container.
#
# nginx is the single, guaranteed owner of the security headers: it strips any
# copy forwarded by the app and re-adds them with `always`, so they are present
# on EVERY response — including 404 and 502, which Nitro's routeRules do not
# cover. HSTS lives only in the TLS (443) block, since it must not be sent over
# plain HTTP. Hashed build assets are cached immutably by the app itself, so this
# proxy forwards their Cache-Control untouched.

upstream shnurok_app {
    server app:3000;
}

# Per-IP limit for the token-backed API, as defense-in-depth on top of the app's
# own in-memory limiter. Must live in the http context (this file is included
# from nginx.conf's http block).
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# Strip the app's own copies so re-adding below never duplicates a header.
proxy_hide_header Content-Security-Policy;
proxy_hide_header X-Frame-Options;
proxy_hide_header X-Content-Type-Options;
proxy_hide_header Referrer-Policy;
proxy_hide_header Permissions-Policy;

server {
    listen 80;
    server_name _;

    # The API caps bodies at 4KB itself; keep the proxy ceiling tight too.
    client_max_body_size 16k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json image/svg+xml application/manifest+json;

    # Security headers — `always` so they apply to error responses too.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Anti-spoof: overwrite X-Forwarded-For with the real connecting IP so the
    # app's per-IP rate limiter cannot be bypassed with a forged header.
    # If you put ANOTHER trusted proxy/CDN in front of this nginx, switch to
    # $proxy_add_x_forwarded_for and configure `set_real_ip_from` for its range.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $host;
    proxy_http_version 1.1;
    proxy_read_timeout 30s;

    # Token-backed proxy endpoint -> rate limit (inherits headers above).
    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://shnurok_app;
    }

    location / {
        proxy_pass http://shnurok_app;
    }
}

